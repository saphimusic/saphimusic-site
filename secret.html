<script>
    //GLOBALCANVAS
const globalCanvas = document.getElementById('global-canvas');
let isDrawing = false;
let currentColor = '#000000';

// 1. Listen to the whole window for mouse actions
window.addEventListener('mousedown', () => isDrawing = true);
window.addEventListener('mouseup', () => isDrawing = false);

window.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;

    // Create a pixel
    const pixel = document.createElement('div');
    pixel.className = 'paint-pixel';
    
    // Use clientX/Y for true screen coordinates
    pixel.style.left = `${e.clientX}px`;
    pixel.style.top = `${e.clientY}px`;
    pixel.style.backgroundColor = currentColor;

    globalCanvas.appendChild(pixel);
});

// 2. Color Selection Logic
// We target the swatches in your Paint window to change the global brush color
document.querySelectorAll('.swatch').forEach(swatch => {
    swatch.addEventListener('mousedown', (e) => {
        // Prevent drawing while just trying to pick a color
        e.stopPropagation(); 
        const style = window.getComputedStyle(swatch);
        currentColor = style.backgroundColor;
        document.querySelector('.color-box.front').style.background = currentColor;
    });
});

// REAL-TIME SYSTEM CLOCK
function updateClock() {
    const now = new Date();
    
    // Format: HH:MM:SS (or remove :ss if you want it cleaner)
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    
    const timeString = `${hours}:${minutes}:${seconds}`;
    
    // Target the clock div
    const clockElement = document.querySelector('.system-clock');
    if (clockElement) {
        clockElement.textContent = timeString;
    }
}

// Run immediately, then every second
updateClock();
setInterval(updateClock, 1000);

</script>
